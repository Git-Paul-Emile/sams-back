services:
  - type: web
    name: sams-back
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NAME_APP
        sync: false
      - key: FRONT_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: BCRYPT_SALT
        value: "10"
      - key: ACCESS_TOKEN_EXPIRY
        value: 1d
      - key: REFRESH_TOKEN_EXPIRY
        value: 7d
      - key: EMAIL_PROVIDER
        value: brevo-smtp
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: WHATSAPP_PROVIDER
        value: 360dialog-sandbox
      - key: WHATSAPP_BASE_URL
        sync: false
      - key: WHATSAPP_API_KEY
        sync: false
      - key: WHATSAPP_SANDBOX_NUMBER
        sync: false
      - key: WHATSAPP_MAX_SANDBOX_MESSAGES
        value: "200"
